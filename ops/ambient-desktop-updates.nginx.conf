# Ambient Desktop update hosting for the OVH VPS.
#
# Safety:
# - Dedicated static host only; no proxying to AmbientRPG, Ambient Marketing Bot, or AmbientQuestions.
# - Static root is intentionally outside `/opt/*` app repositories.
# - Validate with `sudo nginx -t` before any reload.

server {
    listen 80;
    listen [::]:80;
    server_name updates.ambient.xyz;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name updates.ambient.xyz;

    # Install certificates with certbot before enabling this site:
    # ssl_certificate /etc/letsencrypt/live/updates.ambient.xyz/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/updates.ambient.xyz/privkey.pem;

    root /var/www/ambient-desktop-updates;
    autoindex off;

    location / {
        return 404;
    }

    location ^~ /desktop/ {
        try_files $uri =404;
        add_header X-Content-Type-Options nosniff always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    location ~* ^/desktop/.*/(latest.*\.ya?ml|release\.json|SHA256SUMS)$ {
        try_files $uri =404;
        default_type text/plain;
        add_header Cache-Control "no-store" always;
        add_header X-Content-Type-Options nosniff always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    location ~* ^/desktop/.*/ambient-desktop-latest-.*\.(dmg|zip|appimage|deb|exe)$ {
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header X-Content-Type-Options nosniff always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    location ~* ^/desktop/.*/.*\.(dmg|zip|exe|appimage|deb|blockmap)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options nosniff always;
        add_header Access-Control-Allow-Origin "*" always;
    }
}
